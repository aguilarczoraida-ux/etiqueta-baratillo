<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etiqueta Producto</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
    }

    /* Etiqueta exacta 50mm x 30mm a 96dpi */
    .etiqueta {
      width: 188px;   /* 50mm */
      height: 113px;  /* 30mm */
      background: white;
      border: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3px 4px 2px 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .empresa {
      font-size: 6.5px;
      font-weight: bold;
      letter-spacing: 0.5px;
      color: #333;
      text-align: center;
      text-transform: uppercase;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nombre {
      font-size: 7.5px;
      font-weight: bold;
      color: #111;
      text-align: center;
      width: 100%;
      line-height: 1.2;
      max-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    svg#barcode {
      width: 100%;
      height: 48px;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .idprod {
      font-size: 6px;
      color: #555;
    }

    .precio {
      font-size: 10px;
      font-weight: bold;
      color: #c0392b;
    }

    /* Controles de impresión — no se imprimen */
    .controles {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn-imprimir {
      background: #2d5016;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-imprimir:hover { background: #5a8f2a; }

    .aviso {
      font-size: 12px;
      color: #666;
      text-align: center;
      max-width: 280px;
    }

    /* Al imprimir: solo la etiqueta, sin fondo, sin controles */
    @media print {
      body {
        background: white;
        margin: 0;
        padding: 0;
        justify-content: flex-start;
      }

      .controles { display: none; }

      .etiqueta {
        border: none;
        box-shadow: none;
        /* Tamaño exacto para impresora de etiquetas */
        width: 50mm;
        height: 30mm;
        padding: 1mm 1.5mm;
      }

      .nombre   { font-size: 2.2mm; max-height: 5mm; }
      .empresa  { font-size: 1.8mm; }
      .precio   { font-size: 3mm; }
      .idprod   { font-size: 1.6mm; }

      svg#barcode { height: 14mm; }

      @page {
        size: 50mm 30mm;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <div class="etiqueta">
    <div class="empresa">FERRETERIA EL BARATILLO</div>
    <div class="nombre" id="nombreProducto">Cargando...</div>
    <svg id="barcode"></svg>
    <div class="bottom-row">
      <span class="idprod" id="idProducto"></span>
      <span class="precio" id="precioProducto"></span>
    </div>
  </div>

  <div class="controles">
    <button class="btn-imprimir" onclick="window.print()">
      🖨️ Imprimir etiqueta
    </button>
    <p class="aviso">
      Configura tu impresora con tamaño de papel <strong>50mm × 30mm</strong>
      y márgenes en <strong>0</strong> antes de imprimir.
    </p>
  </div>

  <script>
    // Leer parámetros de la URL
    const params  = new URLSearchParams(window.location.search);
    const id      = params.get('id')     || '000000';
    const nombre  = params.get('nombre') || 'Sin nombre';
    const precio  = params.get('precio') || '0.00';
    const sku     = params.get('sku')    || id;

    // Rellenar datos
    document.getElementById('nombreProducto').textContent = nombre;
    document.getElementById('idProducto').textContent     = 'Cód: ' + id;
    document.getElementById('precioProducto').textContent = 'S/ ' + parseFloat(precio).toFixed(2);

    // Generar barcode con el SKU
    JsBarcode('#barcode', id, {
      format:      'CODE128',
      lineColor:   '#000',
      width:       1.2,
      height:      40,
      displayValue: true,
      fontSize:    7,
      margin:      2
    });
  </script>

</body>
</html>
